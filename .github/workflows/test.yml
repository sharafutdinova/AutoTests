name: Docker push

on:
  push:
    #branches: [ master, pipeline_for_docker_push ]
    paths:
      - 'src/**'                  # только при изменениях в src
  workflow_dispatch:              # ручной запуск

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  IMAGE_NAME: nbank-autotests-alsu         # имя вашего образа

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # нужно для получения commit hash
