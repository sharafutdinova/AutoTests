name: Push Docker image to Docker Hub

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - pipeline_for_docker_push
    paths:
      - src/**

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  IMAGE_NAME: nbank-autotests-alsu

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # нужно для получения commit hash

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build project and run Checkstyle
        run: mvn clean compile checkstyle:check

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image with commit hash tag
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          docker build -t ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${COMMIT_HASH} .

      - name: Push Docker image to Docker Hub
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          docker push ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${COMMIT_HASH}