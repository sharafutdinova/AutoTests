name: Run tests

# триггер
on: [ push, workflow_dispatch ]

jobs: # аналог этапов
  run-tests:
    name: Set up services (review apps) and run tests
    runs-on: ubuntu-latest
    steps: # шаги конкретной job
      - name: Checkout repository # копируем файлы репозитория внутрь CI агента
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up services
        run: |
          cd infra/docker_compose
          bash restart_docker.sh
          cd ../..
          echo "Waiting for services to be ready..."
          sleep 15

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Run tests
        run: mvn clean test -DwithMock=false -q
        continue-on-error: true
        env:
          APIBASEURL: http://localhost:4111
          UIBASEURL: http://frontend
          APIVERSION: /api/v1
          DB_URL: "jdbc:postgresql://localhost:5433/nbank"
          DB_USERNAME: "postgres"
          DB_PASSWORD: "postgres"

      # Загружаем предыдущий отчёт (историю) из ветки gh-pages
      - name: Load test report history
        uses: actions/checkout@v4
        if: always()
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build test report
        uses: simple-elf/allure-report-action@v1.13
        if: always()
        with:
          gh_pages: gh-pages
          allure_results: target/allure-results
          allure_history: allure-history
          keep_reports: 20 # Number of previous reports to keep @master

      # Генерируем Swagger-отчёт в отдельную папку (не внутри allure-history)
      - name: Run Swagger coverage
        if: always()
        run: |
          chmod +x .swagger-coverage-commandline/bin/swagger-coverage-commandline
          .swagger-coverage-commandline/bin/swagger-coverage-commandline \
          -s http://localhost:4111/v3/api-docs \
          -i target/swagger-coverage-output
          # Создаём отдельную папку для Swagger-отчёта
          mkdir -p swagger-report
          cp swagger-coverage-report.html swagger-report/index.html

      # Копируем Swagger-отчёт в корень allure-history (как отдельный файл, не нарушая структуру)
      - name: Add Swagger report to Allure
        if: always()
        run: |
          cp swagger-coverage-report.html allure-history/swagger-report.html

      - name: Publish test report
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Clean up services
        if: always()
        run: cd infra/docker_compose && docker compose down